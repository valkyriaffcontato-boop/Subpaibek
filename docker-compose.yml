version: '3.8'

services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://...
      - NEXTAUTH_SECRET=...
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: cyberforge
      POSTGRES_DB: cyberforge
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nmap:
    image: instrumentisto/nmap
    restart: no

  nuclei:
    image: projectdiscovery/nuclei
  # ... outros serviços

volumes:
  postgres_data:
